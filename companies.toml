# ── Master company roster — david-reevely/beat-companies ──────────────────────
# Single source of truth for the beat-monitoring tools. Add a company once here
# and every tool picks it up (contracts/news-release/google-news read it live;
# courts fetches it at runtime).
#
# Per-company keys: id, name, beats[], private, canada_gate, match[], tools[]
# (absent tools = all four). Tool-specific blocks: [company.<id>.courts],
# [company.<id>.news_release], [company.<id>.google_news].
#
# COURTS NOTE: a contains-search on a common word ("Canada", "Inc", ...) blows
# the Ontario index's 10,000-result cap. Every company here therefore has an
# explicit [company.<id>.courts] block (exact for common/multinational names,
# contains for distinctive ones). The following carry BEST-EFFORT legal names
# that should be confirmed with the discovery sweep (sweep_courts.py) — they
# fail safe (no match) if wrong, so they never blow the cap:
#   dominion-dynamics, landing-zones, canadian-strategic-missions,
#   marshall-land-systems, canada-rocket, mission-control
# ──────────────────────────────────────────────────────────────────────────────

[meta]
beats = [
    "cybersecurity",
    "defence",
    "nuclear",
    "telecom",
    "space",
    "quantum",
    "transport",
    "health",
    "energy",
    "research",
]
company_tools = [
    "contracts",
    "news_release",
    "google_news",
    "courts",
]

[meta.news_release_sectors]
cybersecurity = "Cybersecurity"
defence = "Defence"
nuclear = "Nuclear"
health = "Health"
telecom = "Telecom"
quantum = "Quantum"
space = "Space"
transport = "Transport"
energy = "Energy"
research = "Ottawa / Research"

[meta.news_release_colors]
Cybersecurity = "#1a4f8a"
Defence = "#2e6b3e"
Nuclear = "#7a2e2e"
Health = "#4a6741"
Telecom = "#2e4f6b"
Quantum = "#2e5a4a"
Space = "#3d2e6b"
Transport = "#5a4a2e"
Energy = "#6b5a1a"
"Ottawa / Research" = "#4a4a4a"
Other = "#888888"

